server {
    listen 3020;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML must not be cached — sinon le navigateur réutilise un index.html
    # qui référence un bundle JS obsolète après chaque déploiement et
    # l'utilisateur doit faire un hard reload manuel pour voir les fixes.
    # Les bundles JS/CSS ont un hash dans leur nom, eux peuvent être
    # `immutable` sans risque.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
