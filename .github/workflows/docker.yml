name: 🐳 Container Registry

on:
  repository_dispatch:
    types: [run-docker]
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      should_deploy:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mobile-web

jobs:
  docker:
    name: 🔨 Build, Scan & Push
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.client_payload.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=deploy-preprod,enable=${{ github.ref == 'refs/heads/deploy/preprod' }}
          labels: |
            org.opencontainers.image.title=Whispr Mobile Web
            org.opencontainers.image.description=Whispr frontend (Expo web build)
            org.opencontainers.image.vendor=Whispr
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Determine API base URL
        id: api-url
        env:
          INPUT_REF: ${{ inputs.ref }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          REF="${INPUT_REF:-$GITHUB_REF}"
          if [[ "$REF" == *"deploy/preprod"* ]]; then
            echo "url=https://whispr-preprod.roadmvn.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://whispr-api.roadmvn.com" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/prod/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.should_deploy == true }}
          load: ${{ inputs.should_deploy != true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            API_BASE_URL=${{ steps.api-url.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine Trivy image ref
        id: trivy-ref
        run: |
          if [ "${{ inputs.should_deploy }}" = "true" ]; then
            echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
          else
            FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
            echo "image_ref=$FIRST_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.trivy-ref.outputs.image_ref }}
          format: 'sarif'
          output: 'docker-trivy-results.sarif'
        continue-on-error: true

      - name: Upload Docker Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('docker-trivy-results.sarif') != ''
        with:
          sarif_file: 'docker-trivy-results.sarif'
