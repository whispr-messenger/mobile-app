name: 🚀 CI Pipeline

on:
  push:
    branches: [main, deploy/avant-preprod, deploy/preprod]
    paths-ignore:
      - '**.md'
      - 'documentation/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write
  actions: read
  attestations: write
  id-token: write

env:
  NODE_VERSION: '24'

jobs:
  # ================================
  # Tests and Quality
  # ================================
  tests:
    name: 🧪 Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests --coverage

      - name: Check SonarCloud secrets
        id: check-secrets
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [[ -n "$SONAR_TOKEN" && -n "$SONAR_HOST_URL" ]]; then
            echo "secrets-available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets-available=false" >> $GITHUB_OUTPUT
            echo "SonarCloud secrets not configured. Skipping analysis."
          fi

      - name: SonarCloud Analysis
        if: ${{ steps.check-secrets.outputs.secrets-available == 'true' }}
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarCloud Quality Gate
        if: ${{ steps.check-secrets.outputs.secrets-available == 'true' }}
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 30

  # ================================
  # Security Scanning
  # ================================
  security:
    name: 🛡️ Security Analysis
    uses: ./.github/workflows/trivy.yml
    with:
      ref: ${{ github.ref }}

  # ================================
  # Docker Build
  # ================================
  docker:
    name: 📦 Container Registry
    needs: [tests, security]
    if: success()
    uses: ./.github/workflows/docker.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ github.event_name == 'push' }}
