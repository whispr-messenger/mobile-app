sonar.projectKey=whispr-messenger_mobile-app
sonar.organization=whispr-messenger
sonar.projectName=Whispr Messenger Mobile App
sonar.sources=src
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=node_modules/**,web-build/**,coverage/**
# SyncContactsModal: composant natif (Contacts API) non testable en Jest - couverture via Playwright
sonar.coverage.exclusions=src/components/Contacts/SyncContactsModal.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
